<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HTML Blob Manager</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#0f0f0f;
    color:#eee;
}

/* Top bar */
header {
    display:flex;
    gap:8px;
    padding:10px;
    background:#1a1a1a;
}

textarea {
    width:100%;
    height:200px;
    background:#111;
    color:#0f0;
    border:none;
    padding:10px;
    font-family:monospace;
    resize:vertical;
}

/* Grid */
#grid {
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
    gap:10px;
    padding:10px;
}

.card {
    background:#1c1c1c;
    border-radius:8px;
    overflow:hidden;
    position:relative;
}

.thumb {
    width:100%;
    height:130px;
    border:none;
    background:#fff;
}

.meta {
    padding:6px;
    font-size:12px;
}

.title {
    width:100%;
    background:transparent;
    border:none;
    color:#fff;
}

/* Hover actions */
.actions {
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.75);
    display:flex;
    justify-content:center;
    align-items:center;
    gap:8px;
    opacity:0;
    transition:.2s;
}

.card:hover .actions {
    opacity:1;
}

button {
    cursor:pointer;
}
</style>
</head>

<body>

<header>
    <input type="file" id="fileInput" accept=".html,.htm">
    <button onclick="loadFromFile()">Load File</button>
    <button onclick="saveHTML()">Save</button>
    <button onclick="openPreview()">Open Preview (New Tab)</button>
</header>

<textarea id="editor" placeholder="Paste or edit HTML here..."></textarea>

<div id="grid"></div>

<script>
const KEY = "html_store_v2";

/* -------------------------
   STORAGE
------------------------- */
function getStore(){
    return JSON.parse(localStorage.getItem(KEY) || "[]");
}

function setStore(data){
    localStorage.setItem(KEY, JSON.stringify(data));
}

/* -------------------------
   FILE LOAD
------------------------- */
function loadFromFile(){
    const input = document.getElementById("fileInput");
    if(!input.files.length) return;

    const reader = new FileReader();
    reader.onload = () => {
        document.getElementById("editor").value = reader.result;
    };
    reader.readAsText(input.files[0]);
}

/* -------------------------
   SAVE HTML
------------------------- */
function saveHTML(){
    const html = document.getElementById("editor").value;
    if(!html.trim()) return alert("Empty HTML");

    const store = getStore();

    store.push({
        id: Date.now(),
        title: "Untitled",
        html,
        modified: new Date().toISOString()
    });

    setStore(store);
    renderGrid();
}

/* -------------------------
   OPEN IN NEW TAB (BLOB)
------------------------- */
function openPreview(html=null){
    const content = html || document.getElementById("editor").value;
    if(!content.trim()) return;

    const blob = new Blob([content], {type:"text/html"});
    const url = URL.createObjectURL(blob);

    window.open(url, "_blank");
}

/* -------------------------
   GRID RENDER
------------------------- */
function renderGrid(){
    const grid = document.getElementById("grid");
    grid.innerHTML = "";

    const store = getStore();

    store.forEach(item=>{
        const card = document.createElement("div");
        card.className = "card";

        /* SAFE THUMBNAIL (sandbox iframe) */
        const iframe = document.createElement("iframe");
        iframe.className = "thumb";
        iframe.sandbox = "";
        iframe.srcdoc = item.html;

        const meta = document.createElement("div");
        meta.className = "meta";

        const title = document.createElement("input");
        title.className = "title";
        title.value = item.title;

        title.onchange = ()=>{
            item.title = title.value;
            item.modified = new Date().toISOString();
            setStore(store);
        };

        const date = document.createElement("div");
        date.textContent = new Date(item.modified).toLocaleString();

        meta.appendChild(title);
        meta.appendChild(date);

        /* ACTIONS */
        const actions = document.createElement("div");
        actions.className = "actions";

        const openBtn = document.createElement("button");
        openBtn.textContent = "Open";
        openBtn.onclick = ()=>openPreview(item.html);

        const editBtn = document.createElement("button");
        editBtn.textContent = "Edit";
        editBtn.onclick = ()=>{
            document.getElementById("editor").value = item.html;
        };

        const delBtn = document.createElement("button");
        delBtn.textContent = "Delete";
        delBtn.onclick = ()=>{
            const updated = store.filter(x=>x.id!==item.id);
            setStore(updated);
            renderGrid();
        };

        actions.appendChild(openBtn);
        actions.appendChild(editBtn);
        actions.appendChild(delBtn);

        card.appendChild(iframe);
        card.appendChild(meta);
        card.appendChild(actions);

        grid.appendChild(card);
    });
}

/* -------------------------
   INIT
------------------------- */
renderGrid();
</script>

</body>
</html>
