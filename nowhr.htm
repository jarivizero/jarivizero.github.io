<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hash Loader</title>
  <style>
    :root{color-scheme:dark;--bg:#0b1020;--panel:#111833;--text:#e8eeff;--muted:#9fb0d0;--accent:#7aa2ff;--border:#243055}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:linear-gradient(180deg,#09101f,#0b1020 40%,#070b15);color:var(--text)}
    .wrap{max-width:980px;margin:0 auto;padding:24px}
    .card{background:rgba(17,24,51,.9);border:1px solid var(--border);border-radius:18px;padding:18px;box-shadow:0 18px 50px rgba(0,0,0,.35)}
    h1{margin:0 0 10px;font-size:24px}
    p,li{color:var(--muted);line-height:1.5}
    input,button,select,textarea{font:inherit;border-radius:12px;border:1px solid var(--border);background:#0c1329;color:var(--text)}
    input,select,textarea{width:100%;box-sizing:border-box;padding:12px}
    button{padding:12px 16px;cursor:pointer;background:linear-gradient(180deg,#3157c9,#2443a0);border-color:#496dd7}
    button:hover{filter:brightness(1.08)}
    .row{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:end}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .small{font-size:13px}
    pre{white-space:pre-wrap;word-break:break-word;background:#060a15;border:1px solid var(--border);border-radius:14px;padding:14px;min-height:180px;max-height:70vh;overflow:auto}
    .status{margin-top:10px;font-size:13px;color:#b7c5e6}
    .hidden{display:none}
    .sentinel{height:1px}
    audio,video{width:100%;margin-top:10px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Hash Loader</h1>
      <p class="small">Paste a hash or open a URL with <code>#</code>. Format: <code>bob.js:0-500:decryptionkey:filenametosaveas.filetype</code>.</p>
      <div class="row">
        <div>
          <label for="src">Input</label>
          <input id="src" placeholder="#bob.js:0-500:decryptionkey:note.txt or base64/plaintext" />
        </div>
        <button id="go">Load</button>
      </div>
      <div class="grid" style="margin-top:12px">
        <div>
          <label for="mainurl">Main URL</label>
          <input id="mainurl" value="https://jarivizero.github.io/" />
        </div>
        <div>
          <label for="key">Fallback key</label>
          <input id="key" value="githubjarivizero" />
        </div>
      </div>
      <div id="status" class="status">Ready.</div>
      <div id="media"></div>
      <pre id="out"></pre>
      <div id="sentinel" class="sentinel"></div>
    </div>
  </div>
<script>
const $ = s => document.querySelector(s);
const out = $('#out'), statusEl = $('#status'), media = $('#media'), sentinel = $('#sentinel');
let plainText = '', loaded = 0, currentText = '';
function setStatus(t){statusEl.textContent = t}
function isBase64(s){return /^[A-Za-z0-9+/=\n\r_-]+$/.test(s) && s.length % 4 !== 1}
function b64ToBytes(b64){const s=atob(b64.replace(/-/g,'+').replace(/_/g,'/'));const a=new Uint8Array(s.length);for(let i=0;i<s.length;i++)a[i]=s.charCodeAt(i);return a}
function bytesToText(bytes){return new TextDecoder().decode(bytes)}
function parseHash(h){h=(h||location.hash||'').replace(/^#/,'');if(!h)return null;const parts=h.split(':');if(parts.length>=4&&/\.\w+$/.test(parts[3])) return {file:parts[0],range:parts[1],key:parts[2]||'githubjarivizero',saveas:parts.slice(3).join(':')}; if(parts.length>=3&&/\d+-\d+/.test(parts[1])) return {file:parts[0],range:parts[1],key:parts[2]||'githubjarivizero',saveas:''}; return {raw:h}} 
async function fetchRange(url,start,end){const r=await fetch(url,{headers:{Range:`bytes=${start}-${end}`}});return new Uint8Array(await r.arrayBuffer())}
async function decryptBytes(bytes,key){const k=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(key));const iv=new Uint8Array(16);const data=bytes.slice(16);const ivsrc=bytes.slice(0,16);iv.set(ivsrc);const cryptoKey=await crypto.subtle.importKey('raw',k,{name:'AES-CBC'},false,['decrypt']);return new Uint8Array(await crypto.subtle.decrypt({name:'AES-CBC',iv},cryptoKey,data))}
function renderMedia(blob,name){media.innerHTML='';const url=URL.createObjectURL(blob); if(/\.mp3$/i.test(name)){const a=document.createElement('audio');a.controls=true;a.src=url;media.appendChild(a)} else if(/\.mp4$/i.test(name)){const v=document.createElement('video');v.controls=true;v.src=url;media.appendChild(v)} else {const a=document.createElement('a');a.href=url;a.download=name||'download.bin';a.textContent='Download decrypted file';a.style.color='var(--accent)';a.style.display='inline-block';a.style.marginTop='10px';media.appendChild(a)}}
function appendText(t){currentText += t;out.textContent = currentText}
async function loadTextLazy(text){currentText='';out.textContent='';let i=0;const chunk=5000;function step(){const next=text.slice(i,i+chunk); appendText(next); i+=chunk; if(i<text.length) requestAnimationFrame(step)} step()}
async function load(){const raw=$('#src').value.trim()||location.hash; if(!raw){setStatus('Enter a hash or paste a base64/plaintext value.');return}
let parsed=parseHash(raw); if(!parsed){setStatus('Nothing to load.');return}
if(parsed.raw){const v=parsed.raw; if(isBase64(v)){try{const txt=bytesToText(b64ToBytes(v)); out.textContent=txt; setStatus('Base64 decoded as text.'); return}catch(e){out.textContent=v; setStatus('Not valid text; showing raw input.'); return}} out.textContent=v; setStatus('Plaintext shown.'); return}
const mainurl=$('#mainurl').value.replace(/\/$/,'')+'/'
const url=new URL(parsed.file,mainurl).toString()
const [s,e]=parsed.range.split('-').map(n=>parseInt(n,10))
setStatus('Fetching bytes...')
let bytes=await fetchRange(url,s||0,e||499)
if(parsed.key){setStatus('Decrypting...'); try{bytes=await decryptBytes(bytes,parsed.key||'githubjarivizero')}catch(e){setStatus('Decrypt failed; showing bytes.')}}
const saveas=parsed.saveas||''
const text=bytesToText(bytes)
const likelyText=saveas.toLowerCase().startsWith('text/') || /\.(txt|md|json|js|css|html|svg|xml|csv|log|yml|yaml)$/i.test(saveas)
if(saveas && !likelyText){const blob=new Blob([bytes]); renderMedia(blob,saveas); out.textContent=text.slice(0,500); setStatus('Binary file loaded; previewing first 500 chars and offering download.'); return}
if(text.length > 500000){setStatus('Large text detected; lazy loading on scroll.'); plainText=text; loaded=0; currentText=''; out.textContent=''; const obs=new IntersectionObserver((entries)=>{if(entries.some(e=>e.isIntersecting)&&loaded<plainText.length){const next=plainText.slice(loaded, loaded+50000); loaded += next.length; appendText(next); if(loaded>=plainText.length) obs.disconnect()}},{root:null,threshold:0.1}); obs.observe(sentinel); requestAnimationFrame(()=>sentinel.scrollIntoView({block:'end'})); return}
out.textContent=text; setStatus('Done.'); }
$('#go').addEventListener('click',load); window.addEventListener('hashchange',load); window.addEventListener('load',()=>{if(location.hash) load()});
</script>
</body>
</html>
